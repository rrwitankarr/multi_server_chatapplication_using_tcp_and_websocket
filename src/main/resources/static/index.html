<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distributed Chat</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a40;
      --accent-a: #00e5ff;
      --accent-b: #ff3cac;
      --accent-c: #7b2fff;
      --text: #e8e8f0;
      --text-muted: #6b6b88;
      --online: #00ffa3;
      --glow-a: rgba(0, 229, 255, 0.15);
      --glow-b: rgba(255, 60, 172, 0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient orbs */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123, 47, 255, 0.08) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0);
      }

      to {
        transform: translate(-60px, 80px);
      }
    }

    .orb2 {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 229, 255, 0.06) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
      pointer-events: none;
      z-index: 0;
      animation: drift2 10s ease-in-out infinite alternate;
    }

    @keyframes drift2 {
      from {
        transform: translate(0, 0);
      }

      to {
        transform: translate(80px, -50px);
      }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 520px;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header */
    .header {
      margin-bottom: 24px;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-c), var(--accent-a));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(123, 47, 255, 0.4);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, var(--accent-a) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-sub {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-left: 48px;
    }

    /* Card shell */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
    }

    /* Identity bar */
    .identity-bar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
    }

    .identity-bar label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      flex-shrink: 0;
    }

    #name {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      caret-color: var(--accent-a);
    }

    #name::placeholder {
      color: var(--text-muted);
    }

    /* Server selector */
    .server-bar {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .server-bar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      flex-shrink: 0;
      margin-right: 4px;
    }

    .server-btn {
      flex: 1;
      padding: 8px 0;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .server-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .server-btn.btn-a::before {
      background: var(--glow-a);
    }

    .server-btn.btn-b::before {
      background: var(--glow-b);
    }

    .server-btn.btn-a:hover {
      border-color: var(--accent-a);
      color: var(--accent-a);
    }

    .server-btn.btn-b:hover {
      border-color: var(--accent-b);
      color: var(--accent-b);
    }

    .server-btn:hover::before {
      opacity: 1;
    }

    .server-btn.active-a {
      border-color: var(--accent-a);
      color: var(--accent-a);
      background: rgba(0, 229, 255, 0.08);
    }

    .server-btn.active-b {
      border-color: var(--accent-b);
      color: var(--accent-b);
      background: rgba(255, 60, 172, 0.08);
    }

    .server-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .btn-a .server-dot {
      background: var(--accent-a);
    }

    .btn-b .server-dot {
      background: var(--accent-b);
    }

    .btn-a.active-a .server-dot,
    .btn-b.active-b .server-dot {
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 currentColor;
      }

      50% {
        opacity: 0.7;
        box-shadow: 0 0 0 4px transparent;
      }
    }

    /* Status strip */
    .status-strip {
      padding: 6px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
    }

    .status-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    .status-indicator.connected {
      background: var(--online);
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    /* Chat area */
    .chat-area {
      height: 300px;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar {
      width: 4px;
    }

    .chat-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    #chat {
      display: none;
      /* hidden, we use the div instead */
    }

    .msg-row {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text);
      padding: 2px 0;
      animation: msgIn 0.25s ease both;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateX(-8px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .msg-row .sender {
      font-weight: 700;
      margin-right: 6px;
    }

    .msg-row.from-a .sender {
      color: var(--accent-a);
    }

    .msg-row.from-b .sender {
      color: var(--accent-b);
    }

    .msg-row.system {
      color: var(--text-muted);
      font-style: italic;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 8px;
    }

    .empty-icon {
      font-size: 28px;
      opacity: 0.4;
    }

    .empty-text {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.5;
    }

    /* Input bar */
    .input-bar {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--surface2);
    }

    #msg {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: var(--accent-a);
    }

    #msg:focus {
      border-color: var(--accent-a);
      box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.08);
    }

    #msg::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent-c), var(--accent-a));
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(0, 229, 255, 0.25);
    }

    .send-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 24px rgba(0, 229, 255, 0.4);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>

<body>

  <div class="orb2"></div>

  <div class="container">
    <div class="header">
      <div class="header-top">
        <div class="logo-icon">⚡</div>
        <h1>Distributed Chat</h1>
      </div>
      <div class="header-sub">multi-server realtime messaging</div>
    </div>

    <div class="card">

      <!-- Identity -->
      <div class="identity-bar">
        <label>Username</label>
        <input id="name" placeholder="enter your name..." autocomplete="off" spellcheck="false">
      </div>

      <!-- Server selector -->
      <div class="server-bar">
        <span class="server-bar-label">Connect</span>
        <button class="server-btn btn-a" onclick="connect(8080)" id="btnA">
          <span class="server-dot"></span>
          Server A · :8080
        </button>
        <button class="server-btn btn-b" onclick="connect(8081)" id="btnB">
          <span class="server-dot"></span>
          Server B · :8081
        </button>
      </div>

      <!-- Status strip -->
      <div class="status-strip">
        <span class="status-indicator" id="statusDot"></span>
        <span id="statusText">not connected</span>
      </div>

      <!-- Chat messages -->
      <div class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">💬</div>
          <div class="empty-text">no messages yet</div>
        </div>
      </div>

      <!-- Hidden original textarea (preserves functionality) -->
      <textarea id="chat" style="display:none"></textarea>

      <!-- Message input -->
      <div class="input-bar">
        <input id="msg" placeholder="type a message..." autocomplete="off" spellcheck="false"
          onkeydown="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()" id="sendBtn" disabled title="Send">
          ↑
        </button>
      </div>
    </div>
  </div>

  <script>
    let ws;
    let currentServer = null;
    let servers = [8080, 8081];
    let currentIndex = -1;
    let username = "";
    let manualDisconnect = false;
    let retryCount = 0;
    let maxRetries = servers.length; // = 2 servers

    function setStatus(connected, label) {
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      dot.className = 'status-indicator' + (connected ? ' connected' : '');
      txt.textContent = label;
    }

    function addMessage(text, type) {
      const area = document.getElementById('chatArea');
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();

      const row = document.createElement('div');
      row.className = 'msg-row ' + (type || '');

      // Try to parse "Name: message" pattern for coloring
      const colonIdx = text.indexOf(':');
      if (type !== 'system' && colonIdx > 0) {
        const sender = document.createElement('span');
        sender.className = 'sender';
        sender.textContent = text.slice(0, colonIdx + 1);
        row.appendChild(sender);
        row.appendChild(document.createTextNode(text.slice(colonIdx + 1)));
      } else {
        row.textContent = text;
      }

      area.appendChild(row);
      area.scrollTop = area.scrollHeight;
    }

    function connect(p, isAuto = false) {

      manualDisconnect = false;
      currentIndex = servers.indexOf(p);

      ws = new WebSocket("ws://localhost:" + p + "/chat");

      ws.onopen = () => {
        retryCount = 0;
        username = document.getElementById("name").value.trim();

        if (username === "") {
          alert("Enter name first!");
          ws.close();
          return;
        }

        ws.send(username);

        currentServer = p === 8080 ? 'A' : 'B';

        document.getElementById('btnA').className =
          'server-btn btn-a' + (p === 8080 ? ' active-a' : '');
        document.getElementById('btnB').className =
          'server-btn btn-b' + (p === 8081 ? ' active-b' : '');

        setStatus(true, `connected to server ${currentServer} · :${p}`);
        document.getElementById('sendBtn').disabled = false;

        if (isAuto)
          addMessage(`auto-switched to server ${currentServer}`, 'system');
        else
          addMessage(`joined server ${currentServer}`, 'system');
      };

      ws.onmessage = e => {

        if (e.data.startsWith("USERS:"))
          return;

        document.getElementById('chat').value += e.data + "\n";

        const serverClass =
          currentServer === 'A' ? 'from-a' : 'from-b';

        addMessage(e.data, serverClass);
      };

      ws.onclose = () => {

        setStatus(false, 'disconnected');
        document.getElementById('sendBtn').disabled = true;

        if (!manualDisconnect) {
          addMessage(`⚠ server ${currentServer} crashed`, 'system');

          setTimeout(() => {
            switchServer();
          }, 1000);
        } else {
          addMessage('connection closed', 'system');
        }
      };

      ws.onerror = () => {
        setStatus(false, 'connection error');
      };
    }

    function send() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const val = document.getElementById('msg').value.trim();
      if (!val) return;
      ws.send(val);
      document.getElementById('msg').value = "";
    }
    function switchServer() {

      if (retryCount >= servers.length) {
        addMessage("❌ All servers are down", "system");
        setStatus(false, "all servers down");
        return;
      }

      currentIndex = (currentIndex + 1) % servers.length;
      let nextPort = servers[currentIndex];

      retryCount++;   // move this AFTER selecting next server

      connect(nextPort, true);
    }
  </script>
</body>

</html>
